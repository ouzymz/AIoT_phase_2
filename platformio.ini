[env:freenove_esp32s3]
platform = espressif32@6.10.0
board = freenove_esp32_s3_wroom
framework = arduino
monitor_speed = 115200
upload_port = /dev/cu.usbmodem5AE70815351
monitor_port = /dev/cu.usbmodem5AE70815351
build_flags =
    -DARDUINO_USB_MODE=0
    -DBOARD_HAS_PSRAM
    -Iinclude
board_build.arduino.memory_type = qio_opi
lib_deps = esp32-camera